name: release

# Build standalone flashpod binaries and attach them to a GitHub Release.
# Tag a release (e.g. `git tag v0.1.0 && git push --tags`) to publish, or run
# manually from the Actions tab to produce downloadable artifacts for testing.
#
# macOS is NOT built here: the target is OS X 10.8, which no GitHub runner (or
# modern Python) supports. Build that one by hand on 10.8 hardware and upload
# it to the release — see BUILD.md.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04        # older glibc = runs on more Linux systems
            artifact: flashpod-linux-x86_64
          - os: windows-latest
            artifact: flashpod-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller mutagen

      - name: Build the binary
        run: pyinstaller --clean --noconfirm flashpod.spec

      - name: Name the artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/flashpod.exe "dist/${{ matrix.artifact }}"
          else
            mv dist/flashpod "dist/${{ matrix.artifact }}"
          fi

      - name: Smoke test (self-test + bundled firmware)
        shell: bash
        run: |
          BIN="dist/${{ matrix.artifact }}"
          "./$BIN" flash --self-test
          python -c "open('dummy.img','wb').truncate(64*1024*1024)"
          "./$BIN" flash dummy.img --dry-run --yes

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
