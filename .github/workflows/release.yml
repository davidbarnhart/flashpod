name: release

# Build standalone flashpod binaries and attach them to a GitHub Release.
# Tag a release (e.g. `git tag v0.1.0 && git push --tags`) to publish, or run
# manually from the Actions tab to produce downloadable artifacts for testing.
#
# macOS is NOT built here: the target is OS X 10.8, which no GitHub runner (or
# modern Python) supports. Build that one by hand on 10.8 hardware and upload
# it to the release — see BUILD.md.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

# Run JavaScript actions on Node 24. checkout/setup-python are bumped to their
# Node-24 majors below; this also covers the artifact + release actions, whose
# current majors still ship a Node-20 entry point, so no deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04        # older glibc = runs on more Linux systems
            slug: linux-x86_64
            bin: flashpod
            archive: flashpod-linux-x86_64.tar.gz
          - os: windows-latest
            slug: windows-x86_64
            bin: flashpod.exe
            archive: flashpod-windows-x86_64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller mutagen

      - name: Python 3.6 compatibility check (macOS 10.8 build target)
        shell: bash
        run: sh scripts/check-py36-compat.sh

      - name: Build the binary
        run: pyinstaller --clean --noconfirm flashpod.spec

      - name: Smoke test (self-test + firmware download)
        shell: bash
        run: |
          BIN="dist/${{ matrix.bin }}"
          "./$BIN" flash --self-test
          python -c "open('dummy.img','wb').truncate(64*1024*1024)"
          "./$BIN" flash dummy.img --dry-run --yes

      - name: Package archive
        shell: bash
        run: |
          stage="flashpod-${{ matrix.slug }}"
          mkdir -p "$stage"
          cp "dist/${{ matrix.bin }}" "$stage/${{ matrix.bin }}"
          cp LICENSE "$stage/"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp packaging/windows/README.txt "$stage/"
            7z a -tzip "${{ matrix.archive }}" "$stage" >/dev/null
          else
            cp packaging/linux/install.sh "$stage/" && chmod +x "$stage/install.sh"
            cp packaging/linux/README.txt "$stage/"
            chmod +x "$stage/${{ matrix.bin }}"
            tar czf "${{ matrix.archive }}" "$stage"
          fi
          ls -l "${{ matrix.archive }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
